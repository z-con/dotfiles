<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 74">
  <defs>
    <clipPath id="a">
      <!--
        Apple body: CCW from top-center dip → left lobe → down left → bottom →
        up right → bite arc (concave, radius 9) → right lobe → back to center.
      -->
      <path d="M28,18
               C24,10 12,5 8,11
               C2,17 0,31 0,43
               C0,57 10,69 22,71
               C26,73 30,71 34,71
               C38,71 42,73 46,71
               C52,69 56,57 56,43
               C56,31 52,21 48,37
               A9,9 0 0 0 48,19
               C46,15 40,13 34,15
               C32,15 30,16 28,18Z"/>
    </clipPath>
  </defs>

  <!-- 1977 rainbow stripes: green → yellow → orange → red → purple → blue -->
  <rect clip-path="url(#a)" x="0" y="5"  width="56" height="11" fill="#6DBF4A"/>
  <rect clip-path="url(#a)" x="0" y="16" width="56" height="11" fill="#F5C726"/>
  <rect clip-path="url(#a)" x="0" y="27" width="56" height="11" fill="#F47D20"/>
  <rect clip-path="url(#a)" x="0" y="38" width="56" height="11" fill="#D52B1E"/>
  <rect clip-path="url(#a)" x="0" y="49" width="56" height="11" fill="#9B4F96"/>
  <rect clip-path="url(#a)" x="0" y="60" width="56" height="14" fill="#1C75BD"/>

  <!-- Stem -->
  <path d="M28,18 C30,9 37,4 40,2" stroke="#6DBF4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
